<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Self-contained Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config={
            theme:{
                extend:{
                    fontFamily:{sans:['Nunito','sans-serif'],heading:['Poppins','sans-serif']},
                    colors:{'ocean-surface':'#4ea8de','ocean-sunlight':'#0077b6','ocean-twilight':'#03045e','ocean-midnight':'#01012b','ocean-abyssal':'#000010','ocean-hadal':'#000000'}
                }
            }
        }
    </script>
    <title>Study Deck | SciOly Oceans</title>
    <style>
        body{background-color:#4c1d95;overflow-x:hidden;}
        @keyframes pop-in{0%{transform:scale(0.5);opacity:0;}100%{transform:scale(1);opacity:1;}} 
        .anim-pop{animation:pop-in 0.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards;}
        .perspective-1000{perspective:1000px;}
        .transform-style-3d{transform-style:preserve-3d;}
        .backface-hidden{backface-visibility:hidden;}
        .rotate-y-180{transform:rotateY(180deg);}
        
        /* Bubble Animation */
        .bubble {
            position: absolute;
            bottom: -50px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            animation: rise infinite ease-in;
            pointer-events: none;
        }
        @keyframes rise {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-110vh) translateX(30px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body class="text-gray-800 antialiased font-sans pb-16 relative">
    
    <!-- Background Bubbles -->
    <div id="bubbles-container" class="fixed inset-0 pointer-events-none z-0"></div>

    <!-- Confetti Canvas (Added for the victory effect) -->
    <canvas id="confetti-canvas" class="fixed inset-0 pointer-events-none z-40 hidden"></canvas>

    <!-- Badge -->
    <div id="badge-toast" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 z-50 px-8 py-4 bg-yellow-400 text-yellow-900 rounded-full shadow-2xl font-bold text-lg" style="animation:pop-in 0.4s forwards;">
        🎓 SciOly Scholar Badge Earned!
    </div>
            
    <section class="pt-12 pb-4 px-4 max-w-5xl mx-auto text-center relative z-10">
        <h2 class="text-4xl sm:text-5xl font-heading font-black text-white mb-2 drop-shadow-md">Oceanography Master Deck</h2>
        <p class="text-purple-200 text-lg mb-6">Science Olympiad - 99th Percentile Prep</p>
        
        <!-- Progress & Controls -->
        <div class="max-w-xl mx-auto bg-purple-900/50 p-4 rounded-2xl backdrop-blur-sm border border-purple-500/30 shadow-lg">
            <div class="flex justify-between items-center mb-2">
                <span id="progress-text" class="text-yellow-400 font-bold text-sm tracking-wider uppercase">0 / 0 Mastered</span>
                <button onclick="shuffleAndReset()" class="text-xs bg-purple-600 hover:bg-purple-500 text-white py-1 px-3 rounded-full font-bold transition-colors active:scale-95 shadow-md">
                    🔀 Shuffle Deck & Quiz
                </button>
            </div>
            <div class="w-full bg-purple-950 rounded-full h-3 overflow-hidden shadow-inner">
                <div id="progress-bar" class="bg-gradient-to-r from-yellow-500 to-yellow-300 h-full transition-all duration-500 ease-out" style="width: 0%"></div>
            </div>
        </div>
    </section>

    <!-- Flashcards Container -->
    <div class="max-w-7xl mx-auto px-4 relative z-10" id="deck-container">
        <!-- Categories and Flashcards injected via JS -->
    </div>

    <!-- Scholar Victory Notification -->
    <div id="scholar-victory" class="max-w-3xl mx-auto hidden mt-12 bg-white rounded-3xl p-8 text-center anim-pop shadow-2xl border-4 border-yellow-400 relative z-20">
        <h2 class="text-5xl font-black text-gray-800 mb-4">🎉 Elite Oceanographer! 🎉</h2>
        <p class="text-xl text-gray-600 font-semibold mb-6">You've mastered all the concepts! You are ready to dominate your assessment!</p>
        <button onclick="shuffleAndReset()" class="bg-purple-600 hover:bg-purple-500 text-white py-3 px-8 rounded-full font-bold text-lg transition-transform active:scale-95 shadow-lg">
            Study Again
        </button>
    </div>

    <!-- Dynamic Quiz Container -->
    <section id="quiz-container" class="mt-20 pb-12 px-4 max-w-5xl mx-auto relative z-10">
        <!-- Quiz content injected via JS -->
    </section>

    <script>

        let cardsFlipped = 0;
        let totalCards = 0;
        let allCards = []; // Flattened array for the quiz

                    }

            {
                title: "Ocean Zones & Features",

                        kidA: "A magical zero-tide spot in the ocean. While the sea goes crazy spinning around it, this exact spot stays perfectly still!",
                        icon: `<svg class="${iconClass}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="2"/><circle cx="12" cy="12" r="6" stroke-dasharray="3 3"/><circle cx="12" cy="12" r="10" stroke-dasharray="3 3"/></svg>`,
                        backIcon: `<svg class="${backIconClass}" viewBox="0 0 24 24" fill="none" stroke="none"><circle cx="12" cy="12" r="3" fill="#ef4444"/><circle cx="12" cy="12" r="9" stroke="#3b82f6" stroke-width="3" stroke-dasharray="4 4"/></svg>`
                    }
                ]
            },
            {
                title: "Bathymetry & Geology",
                cards: [
                    { 
                        q: "Continental Margin", 
                        a: "Made up of the Continental Shelf, Continental Slope, and Continental Rise.", 
                        kidA: "The underwater edge of our continents. It includes the shallow shelf you swim in, the steep slope down, and the deep rise at the bottom.",
                        icon: `<svg class="${iconClass}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2 6h4l4 6 6 2h6"/></svg>`,
                        backIcon: `<svg class="${backIconClass}" viewBox="0 0 24 24" fill="none" stroke="none"><path d="M2 6h8l4 8h8" stroke="#fcd34d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 6h8l4 8h8V22H2z" fill="#ca8a04" opacity="0.8"/></svg>`
                    },
                    { 
                        q: "Mid-Ocean Ridge", 
                        a: "A massive underwater mountain range formed by divergent plate tectonics.", 
                        kidA: "An epic, giant underwater mountain range that wraps around the entire globe like the stitching on a baseball!",
                        icon: `<svg class="${iconClass}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2 18h4l3-6 2 4 3-8 4 10h4"/></svg>`,
                        backIcon: `<svg class="${backIconClass}" viewBox="0 0 24 24" fill="none" stroke="none"><path d="M2 20l5-10 3 5 2-8 3 8 4-5 3 10H2z" fill="#64748b"/><path d="M12 12l-2 8h4z" fill="#ef4444"/></svg>`
                    },
                    { 
                        q: "Ocean Trench", 
                        a: "Deepest parts of the ocean floor, formed where one plate subducts under another.", 
                        kidA: "The deepest, darkest canyons on Earth! Formed when the ocean floor slowly gets sucked under another piece of Earth's crust.",
                        icon: `<svg class="${iconClass}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2 8h6l4 10 4-10h6"/></svg>`,
                        backIcon: `<svg class="${backIconClass}" viewBox="0 0 24 24" fill="none" stroke="none"><path d="M2 10h6l4 10 4-10h6v12H2z" fill="#1e3a8a"/></svg>`
                    },
                    { 
                        q: "Guyot", 
                        a: "A flat-topped underwater mountain (seamount) flattened by wave erosion.", 
                        kidA: "An underwater volcano whose top got completely chopped off and flattened by crashing waves a long, long time ago.",
                        icon: `<svg class="${iconClass}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2 20h20M6 20l4-8h4l4 8"/></svg>`,
                        backIcon: `<svg class="${backIconClass}" viewBox="0 0 24 24" fill="none" stroke="none"><path d="M4 20l4-8h8l4 8H4z" fill="#94a3b8"/><path d="M2 12h20" stroke="#3b82f6" stroke-width="3" stroke-dasharray="4 4" stroke-linecap="round"/></svg>`
                    },
                    { 
                        q: "Atoll", 
                        a: "A ring-shaped coral reef or island that encircles a central lagoon.", 
                        kidA: "A beautiful ring of coral reefs that grew around a sinking volcano, leaving a calm, round swimming pool (lagoon) in the middle.",
                        icon: `<svg class="${iconClass}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zM12 16a4 4 0 100-8 4 4 0 000 8z"/></svg>`,
                        backIcon: `<svg class="${backIconClass}" viewBox="0 0 24 24" fill="none" stroke="none"><path fill="#38bdf8" d="M2 2h20v20H2z"/><circle cx="12" cy="12" r="8" stroke="#4ade80" stroke-width="5"/><circle cx="12" cy="12" r="4" fill="#0284c7"/></svg>`
                    }
                ]
            },
            {
                title: "Ocean Chemistry & Climate",
                cards: [
                    { 
                        q: "Salinity", 
                        a: "Measure of dissolved salts in water. Average ocean salinity is 35 ppt (parts per thousand).", 
                        kidA: "How salty the water is! If you took a bucket of ocean water and dried it out, you'd find a huge handful of sea salt.",
                        icon: `<svg class="${iconClass}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428A2 2 0 0022 14V8a2 2 0 00-2.572-1.428L14 8.5 7 6 3 9l4 3-4 3 4-3 7-2.5 5.428 1.928z"/><circle cx="12" cy="14" r="1" fill="currentColor"/><circle cx="15" cy="16" r="1" fill="currentColor"/><circle cx="9" cy="15" r="1" fill="currentColor"/></svg>`,
                        backIcon: `<svg class="${backIconClass}" viewBox="0 0 24 24" fill="none" stroke="none"><path d="M8 2h8v6l2 14H6L8 8z" fill="#f8fafc"/><circle cx="12" cy="16" r="1.5" fill="#94a3b8"/><circle cx="10" cy="13" r="1.5" fill="#94a3b8"/><circle cx="15" cy="14" r="1.5" fill="#94a3b8"/></svg>`
                    },
                    { 
                        q: "Ocean Acidification", 
                        a: "Decrease in ocean pH caused by absorbing excess Carbon Dioxide (CO2) from the atmosphere.", 
                        kidA: "When the ocean absorbs too much pollution from the air, it gets slightly acidic, making it super hard for crabs and corals to build their shells.",
                        icon: `<svg class="${iconClass}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428A2 2 0 0022 14V8a2 2 0 00-2.572-1.428L14 8.5 7 6 3 9l4 3-4 3 4-3 7-2.5 5.428 1.928zM12 3v4M10 5h4"/></svg>`,
                        backIcon: `<svg class="${backIconClass}" viewBox="0 0 24 24" fill="none" stroke="none"><path d="M12 4a8 8 0 0 0-8 8c0 4.4 3.6 8 8 8a8 8 0 0 0 8-8c0-4.4-3.6-8-8-8z" stroke="#fcd34d" stroke-width="3" stroke-linecap="round"/><path d="M12 3l-2 6 4 4-2 7" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`
                    },
                    { 
                        q: "Chemosynthesis", 
                        a: "Process where organisms make food using inorganic chemicals (like Hydrogen Sulfide) instead of sunlight.", 
                        kidA: "Making food from stinky chemicals instead of sunlight! Deep-sea bacteria do this near hot underwater volcanoes.",
                        icon: `<svg class="${iconClass}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428A2 2 0 0022 14V8a2 2 0 00-2.572-1.428L14 8.5 7 6 3 9l4 3-4 3 4-3 7-2.5 5.428 1.928z"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 2v2M12 20v2M4.929 4.929l1.414 1.414M17.657 17.657l1.414 1.414M2 12h2M20 12h2M4.929 19.071l1.414-1.414M17.657 6.343l1.414-1.414"/></svg>`,
                        backIcon: `<svg class="${backIconClass}" viewBox="0 0 24 24" fill="none" stroke="none"><path d="M10 3v6L4 18a2 2 0 0 0 2 3h12a2 2 0 0 0 2-3l-6-9V3H10z" fill="#4ade80"/><path d="M12 11v6M9 14h6" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>`
                    }
                ]
            }
        ];

        // Populate flat array of all cards for quiz generation
        originalStudyCategories.forEach(cat => {
            allCards = allCards.concat(cat.cards);
        });

        let studyCategories = JSON.parse(JSON.stringify(originalStudyCategories));

        // --- Audio Synthesizer ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playBloop() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playFanfare() {
            initAudio();
            const now = audioCtx.currentTime;
            [400, 500, 600, 800].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0, now + i * 0.15);
                gain.gain.linearRampToValueAtTime(0.3, now + i * 0.15 + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.5);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + i * 0.15);
                osc.stop(now + i * 0.15 + 0.6);
            });
        }

        // --- Updates & Animations ---
        function updateProgress() {
            const pct = (cardsFlipped / totalCards) * 100;
            document.getElementById('progress-bar').style.width = pct + '%';
            document.getElementById('progress-text').innerText = `${cardsFlipped} / ${totalCards} Mastered`;
            
            if(cardsFlipped === totalCards){
                setTimeout(() => {
                    document.getElementById('scholar-victory').classList.remove('hidden');
                    awardBadge();
                    confetti();
                    playFanfare();
                }, 500);
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function shuffleAndReset() {
            cardsFlipped = 0;
            document.getElementById('scholar-victory').classList.add('hidden');
            
            // Deep copy and shuffle deck
            studyCategories = JSON.parse(JSON.stringify(originalStudyCategories));
            studyCategories.forEach(cat => shuffleArray(cat.cards));
            
            renderFlashcards();
            generateQuiz();
            updateProgress();
        }

        function createBubbles() {
            const container = document.getElementById('bubbles-container');
            container.innerHTML = ''; // clear existing
            for(let i = 0; i < 20; i++) {
                const bubble = document.createElement('div');
                bubble.classList.add('bubble');
                const size = Math.random() * 40 + 10;
                bubble.style.width = `${size}px`;
                bubble.style.height = `${size}px`;
                bubble.style.left = `${Math.random() * 100}%`;
                bubble.style.animationDuration = `${Math.random() * 8 + 4}s`;
                bubble.style.animationDelay = `${Math.random() * 5}s`;
                container.appendChild(bubble);
            }
        }

        // --- Render UI ---
        function renderFlashcards(){
            const container = document.getElementById('deck-container');
            container.innerHTML = ''; // clear existing
            totalCards = 0;
            
            studyCategories.forEach((category) => {
                totalCards += category.cards.length;

                const titleEl = document.createElement('h3');
                titleEl.className = 'text-3xl font-heading font-bold text-white mb-6 mt-12 text-left border-b-2 border-purple-400 pb-2 drop-shadow-md';
                titleEl.innerText = category.title;
                container.appendChild(titleEl);

                const gridEl = document.createElement('div');
                gridEl.className = 'grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6';

                category.cards.forEach((cd) => {
                    // Outer container wrapper separated from transform-style-3d to fix CSS conflict
                    const el = document.createElement('div');
                    el.className = 'perspective-1000 h-[22rem] cursor-pointer hover:scale-[1.02] transition-transform duration-300';
                    el.dataset.f = '0';
                    el.innerHTML = `
                        <div class="relative w-full h-full transition-transform duration-700 transform-style-3d text-center">
                            <!-- Card Front -->
                            <div class="absolute w-full h-full bg-white border-4 border-purple-300 hover:border-purple-400 transition-colors rounded-3xl p-5 shadow-xl flex flex-col justify-center items-center backface-hidden">
                                ${cd.icon}
                                <span class="text-purple-500 text-xs font-black mb-2 uppercase tracking-widest bg-purple-100 px-3 py-1 rounded-full">Question</span>
                                <h3 class="text-xl font-bold text-gray-800 leading-tight">${cd.q}</h3>
                            </div>
                            <!-- Card Back -->
                            <div class="absolute w-full h-full bg-purple-700 rounded-3xl p-5 shadow-xl flex flex-col justify-start items-center backface-hidden rotate-y-180 text-white border-4 border-purple-500 overflow-y-auto">
                                ${cd.backIcon}
                                <div class="flex-grow flex flex-col justify-center w-full">
                                    <span class="text-purple-200 text-[9px] font-black mb-1 uppercase tracking-widest">Science Definition</span>
                                    <p class="text-[13px] font-semibold leading-snug mb-3 text-purple-50">${cd.a}</p>
                                    <div class="bg-purple-800/80 rounded-xl p-3 w-full border border-purple-400/30">
                                        <span class="text-yellow-400 text-[10px] font-black uppercase tracking-widest block mb-1">Kid Translation ✨</span>
                                        <p class="text-[13px] font-medium text-yellow-100 leading-tight italic">"${cd.kidA}"</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    el.onclick = () => {
                        playBloop();
                        el.querySelector('.transform-style-3d').classList.toggle('rotate-y-180');
                        if(el.dataset.f === '0'){
                            el.dataset.f = '1';
                            cardsFlipped++;
                            updateProgress();
                        }
                    };
                    gridEl.appendChild(el);
                });

                container.appendChild(gridEl);
            });
            updateProgress();
        }

        function generateQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = `
                <div class="text-center mb-10">
                    <h3 class="text-4xl font-heading font-black text-white drop-shadow-md border-b-4 border-yellow-400 pb-2 inline-block mx-auto">Knowledge Check Quiz</h3>
                    <p class="text-purple-200 mt-3">Test your mastery of the terms above!</p>
                </div>
                <div class="space-y-6" id="quiz-list"></div>
            `;
            const list = document.getElementById('quiz-list');

            // Clone and shuffle the flat cards array to randomize quiz order
            let quizCards = [...allCards];
            shuffleArray(quizCards);

            quizCards.forEach((card, index) => {
                // Get 3 random wrong answers from the deck
                let wrongAnswers = allCards.filter(c => c.q !== card.q);
                shuffleArray(wrongAnswers);
                wrongAnswers = wrongAnswers.slice(0, 3).map(c => c.a);

                // Combine correct answer with wrong answers and shuffle the options
                let options = [
                    { text: card.a, correct: true },
                    ...wrongAnswers.map(a => ({ text: a, correct: false }))
                ];
                shuffleArray(options);

                // Build question UI
                const qDiv = document.createElement('div');
                qDiv.className = 'bg-white rounded-2xl p-6 shadow-xl border-4 border-purple-200';
                qDiv.innerHTML = `
                    <h4 class="text-xl font-bold text-gray-800 mb-4"><span class="text-purple-500 mr-2 font-black">Q${index + 1}:</span>${card.q}</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 options-grid">
                        ${options.map(opt => `
                            <button class="quiz-btn text-left p-4 rounded-xl border-2 border-gray-200 hover:border-purple-400 hover:bg-purple-50 transition-colors font-medium text-sm text-gray-700" data-correct="${opt.correct}">
                                ${opt.text}
                            </button>
                        `).join('')}
                    </div>
                `;

                // Add grading logic to buttons
                const buttons = qDiv.querySelectorAll('.quiz-btn');
                buttons.forEach(btn => {
                    btn.onclick = () => {
                        // Disable all buttons in this question
                        buttons.forEach(b => {
                            b.disabled = true;
                            b.classList.remove('hover:border-purple-400', 'hover:bg-purple-50', 'cursor-pointer');
                            
                            if (b.dataset.correct === "true") {
                                // Highlight correct answer in green
                                b.classList.add('bg-green-100', 'border-green-500', 'text-green-900');
                            } else {
                                // Fade out wrong answers
                                b.classList.add('opacity-50');
                            }
                        });
                        
                        // Explicitly mark the clicked button red if it was wrong
                        if (btn.dataset.correct === "false") {
                            btn.classList.remove('opacity-50');
                            btn.classList.add('bg-red-100', 'border-red-500', 'text-red-900');
                        } else {
                            playBloop(); // Fun little feedback
                        }
                    };
                });

                list.appendChild(qDiv);
            });
        }

        // --- Victory Effects ---
        function awardBadge(){
            const b=document.getElementById('badge-toast');
            if(b){
                b.classList.remove('hidden');
                setTimeout(()=>b.classList.add('hidden'),4000);
            }
        }

        function confetti(){
            const c=document.getElementById('confetti-canvas');
            if(!c)return;
            c.style.display='block';
            const ctx=c.getContext('2d');
            c.width=window.innerWidth;
            c.height=window.innerHeight;
            let pts=[];
            for(let i=0;i<150;i++) pts.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*6+2,d:Math.random()*10});
            function draw(){
                ctx.clearRect(0,0,c.width,c.height);
                ctx.fillStyle='gold';
                ctx.beginPath();
                pts.forEach(p=>{
                    ctx.moveTo(p.x,p.y);
                    ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);
                });
                ctx.fill();
                pts.forEach(p=>{
                    p.y+=Math.cos(p.d)+1+p.r/2;
                    if(p.y>c.height){p.y=-10;p.x=Math.random()*c.width;}
                });
                requestAnimationFrame(draw);
            }
            draw();
            setTimeout(()=>c.style.display='none',8000);
        }
        
        window.onload = () => { 
            createBubbles();
            renderFlashcards(); 
            generateQuiz();
        };
    </script>
</body>
