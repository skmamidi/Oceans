<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Living Ocean: SciOly Edition</title>
    <!-- Added Tailwind CDN to fix the ReferenceError -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config={theme:{extend:{fontFamily:{sans:['Nunito','sans-serif'],heading:['Poppins','sans-serif']},colors:{'ocean-surface':'#4ea8de','ocean-sunlight':'#0077b6','ocean-twilight':'#03045e','ocean-midnight':'#01012b','ocean-abyssal':'#000010','ocean-hadal':'#000000'}}}}
    </script>
    <style>
        body{background-color:#f0f8ff;overflow-x:hidden;}
        .gradient-ocean{background:linear-gradient(to bottom,#4ea8de 0%,#0077b6 15%,#03045e 35%,#01012b 60%,#000010 85%,#000000 100%);}
        .glass-card{background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.2);color:white;}
        .glass-card-dark{background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);color:white;}
        .float-anim{animation:float 3s ease-in-out infinite;}
        @keyframes float{0%,100%{transform:translateY(0px);}50%{transform:translateY(-10px);}}
        @keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-5px);}40%,80%{transform:translateX(5px);}}
        .anim-shake{animation:shake 0.4s ease-in-out;}
        @keyframes pop-in{0%{transform:scale(0.5);opacity:0;}100%{transform:scale(1);opacity:1;}}
        .anim-pop{animation:pop-in 0.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards;}
        @keyframes blink-light{0%,100%{opacity:0.2;transform:scale(1);}50%{opacity:1;transform:scale(1.5);box-shadow:0 0 15px #60a5fa;}}
        @keyframes bob-lure{0%,100%{transform:translateY(0) translateX(0);}50%{transform:translateY(-10px) translateX(-5px);box-shadow:0 0 20px #fde047;}}
        @keyframes pulse-fast{0%,100%{opacity:0.5;}50%{opacity:1;box-shadow:0 0 10px #4ade80;}}
        .modal-active{opacity:1 !important;pointer-events:auto !important;}
        .modal-scale{transform:scale(1) !important;}
        #confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;}
        .badge-earned{filter:grayscale(0%) !important;opacity:1 !important;transform:scale(1.1);box-shadow:0 0 15px gold;}
        .migration-entity{transition:all 2s ease-in-out;position:absolute;font-size:2rem;cursor:pointer;}
        .migration-entity:hover{transform:scale(1.2);filter:drop-shadow(0 0 10px rgba(255,255,255,0.8));z-index:20;}
        #migration-container.night-mode{background:linear-gradient(to bottom,#01012b,#000000);}
        .sci-oly-box{border-left:4px solid #a855f7;background:rgba(168,85,247,0.1);}
        .depth-marker,.depth-marker-adapt,.depth-marker-grad{transition:all 0.3s;}
        .depth-marker.active .dot{background-color:#3b82f6;transform:scale(1.5);box-shadow:0 0 15px #60a5fa;}
        .depth-marker.active .text-label{color:#60a5fa;font-weight:900;transform:translateX(5px);}
        .depth-marker-adapt.active .dot{background-color:#14b8a6;transform:scale(1.5);box-shadow:0 0 15px #2dd4bf;}
        .depth-marker-adapt.active .text-label{color:#2dd4bf;font-weight:900;transform:translateX(5px);}
        .depth-marker-grad.active .dot{background-color:#f97316;transform:scale(1.5);box-shadow:0 0 15px #fdba74;}
        .depth-marker-grad.active .text-label{color:#fdba74;font-weight:900;transform:translateX(5px);}
        
        .fish-wrapper{position:relative;width:280px;height:160px;display:flex;align-items:center;justify-content:center;transition:all 0.5s cubic-bezier(0.4,0,0.2,1);z-index:10;}
        .f-tail{position:absolute;left:10px;width:60px;height:80px;background:#3b82f6;clip-path:polygon(0 0,100% 50%,0 100%);transition:all 0.5s;z-index:1;}
        .f-body{position:absolute;left:60px;width:140px;height:80px;background:#3b82f6;border-radius:50%;transition:all 0.5s;z-index:2;box-shadow:inset -10px -10px 20px rgba(0,0,0,0.3);border:2px solid rgba(255,255,255,0.2);}
        .f-eye{position:absolute;right:30px;top:20px;width:16px;height:16px;background:white;border-radius:50%;border:2px solid #1e3a8a;transition:all 0.5s;z-index:3;}
        .f-eye::after{content:'';position:absolute;right:2px;top:4px;width:6px;height:6px;background:black;border-radius:50%;transition:all 0.5s;}
        .f-jaw{position:absolute;right:-5px;bottom:0px;width:70px;height:40px;opacity:0;transition:all 0.3s;z-index:4;transform:rotate(15deg) scale(0.5);transform-origin:top left;}
        .f-lure{position:absolute;right:30px;top:-40px;width:60px;height:50px;border-top:3px solid #cbd5e1;border-right:3px solid #cbd5e1;border-radius:0 30px 0 0;opacity:0;transition:all 0.5s;z-index:0;transform:scale(0.5);transform-origin:bottom left;}
        .f-lure::after{content:'';position:absolute;right:-8px;top:-8px;width:16px;height:16px;background:#fef08a;border-radius:50%;box-shadow:0 0 20px 5px #fde047;animation:blink-light 1.5s infinite alternate;}
        .f-photo{position:absolute;bottom:8px;left:10%;width:80%;height:6px;display:flex;justify-content:space-around;opacity:0;transition:opacity 0.5s;z-index:3;}
        .f-photo div{width:6px;height:6px;background:#60a5fa;border-radius:50%;box-shadow:0 0 8px #60a5fa;animation:blink-light 2s infinite alternate;}
        .f-tmao-aura{position:absolute;inset:-15px;border-radius:50%;background:radial-gradient(circle,rgba(168,85,247,0.4) 0%,transparent 70%);opacity:0;transition:all 0.5s;z-index:0;pointer-events:none;animation:pulse-fast 2s infinite;}
        .morph-fusiform .f-body{width:180px;height:50px;border-radius:50% 50% 50% 50% / 40% 40% 60% 60%;left:40px;top:15px;}
        .morph-fusiform .f-tail{height:100px;left:-10px;top:-10px;clip-path:polygon(0 10%,100% 50%,0 90%);}
        .morph-fusiform .f-eye{right:20px;top:12px;}
        .morph-gelatinous .f-body{width:130px;height:100px;border-radius:40% 60% 50% 40% / 50% 40% 60% 50%;background:rgba(255,255,255,0.2) !important;box-shadow:inset 0 0 20px rgba(255,255,255,0.5);border:2px dashed rgba(255,255,255,0.6);backdrop-filter:blur(4px);animation:bob-lure 4s infinite alternate;left:65px;top:-10px;}
        .morph-gelatinous .f-tail{background:rgba(255,255,255,0.2) !important;border:2px dashed rgba(255,255,255,0.4);animation:bob-lure 4s infinite alternate-reverse;top:0px;}
        .morph-gigantism .f-body{transform:scale(1.4);}
        .morph-gigantism .f-tail{transform:scale(1.4) translateX(-10px);}
        .morph-stasis .f-body{opacity:0.6;filter:grayscale(50%);}
        .color-countershaded .f-body,.color-countershaded .f-tail{background:linear-gradient(to bottom,#1e293b 45%,#f1f5f9 55%);box-shadow:inset -10px -10px 20px rgba(0,0,0,0.2);}
        .color-red .f-body,.color-red .f-tail{background:#b91c1c;box-shadow:inset -10px -10px 20px rgba(0,0,0,0.6);border-color:#7f1d1d;}
        .eye-giant .f-eye{width:36px;height:36px;top:10px;right:15px;background:#fef08a;box-shadow:0 0 15px #fef08a;border-color:#ca8a04;}
        .eye-giant .f-eye::after{width:14px;height:14px;right:6px;top:10px;}
        .eye-tubular .f-eye{width:16px;height:30px;border-radius:8px;top:5px;right:25px;transform:rotate(-20deg);background:#fef08a;}
        .eye-blind .f-eye{width:0;height:0;opacity:0;}
        .spec-photophores .f-photo{opacity:1;}
        .spec-lure .f-lure{opacity:1;transform:scale(1);}
        .spec-jaws .f-jaw{opacity:1;transform:rotate(0deg) scale(1);}
        .spec-tmao .f-tmao-aura{opacity:1;}
        .spec-tmao .f-body{border:2px solid #d8b4fe;box-shadow:inset 0 0 20px #a855f7;}
        .spec-chemosyn{filter:drop-shadow(0 0 15px #22c55e);}
        .spec-omz{filter:sepia(0.5) hue-rotate(250deg);}
        .spec-osmo{animation:float 1s ease-in-out infinite alternate;}
        .spec-stilts .f-body::after{content:'';position:absolute;bottom:-30px;left:20px;width:4px;height:50px;background:rgba(255,255,255,0.5);box-shadow:60px 0 rgba(255,255,255,0.5);}
        .spec-sealing .f-body::before{content:'';position:absolute;right:-5px;top:10px;width:12px;height:60px;background:#475569;border-radius:6px;z-index:5;}
        
        .equip-btn{transition:all 0.2s;border:2px solid transparent;position:relative;padding-right:2rem;}
        .equip-btn.active{border-color:#3b82f6;background-color:#eff6ff;}
        .stack-content{transition:max-height 0.4s ease-in-out,opacity 0.3s ease-in-out;max-height:0;opacity:0;overflow:hidden;}
        .stack-content.open{max-height:800px;opacity:1;}
        @keyframes implosion{0%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.2);filter:brightness(2);}100%{transform:translate(-50%,-50%) scale(1,0.1);background-color:#ef4444;border-color:#7f1d1d;}}
        .sub-crushed{animation:implosion 0.3s cubic-bezier(0.25,0.46,0.45,0.94) forwards;}
        .sub-hull-steel{background-color:#94a3b8;border-color:#475569;}
        .sub-hull-titanium{background-color:#cbd5e1;border-color:#3b82f6;box-shadow:inset 0 0 15px rgba(59,130,246,0.5);}
        .sub-hull-bio{background-color:#d8b4fe;border-color:#9333ea;border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;box-shadow:0 0 20px rgba(168,85,247,0.6);}
        .fw-node{position:absolute;transform:translate(-50%,-50%);transition:all 1s ease-in-out;cursor:pointer;z-index:20;}
        .fw-node:hover{transform:translate(-50%,-50%) scale(1.1);filter:drop-shadow(0 0 15px rgba(255,255,255,0.5));}
        .fw-line{stroke:rgba(255,255,255,0.3);stroke-width:3;stroke-dasharray:10;animation:fw-flow 2s linear infinite;transition:stroke 0.5s,opacity 0.5s;}
        @keyframes fw-flow{from{stroke-dashoffset:20;}to{stroke-dashoffset:0;}}
        .bc-fish-svg{width:100%;height:100%;filter:drop-shadow(0 10px 10px rgba(0,0,0,0.8));}
        .bc-bulb{transition:all 0.3s ease;}
        .bc-glow-active{fill:#60a5fa;filter:drop-shadow(0 0 15px #60a5fa);stroke:#93c5fd;stroke-width:2px;}
        .bc-glow-lure{fill:#fde047;filter:drop-shadow(0 0 25px #fef08a);stroke:#fef08a;stroke-width:2px;}
        .bc-glow-flash{fill:#ffffff;filter:drop-shadow(0 0 30px #ffffff);stroke:#ffffff;stroke-width:3px;}
        .perspective-1000{perspective:1000px;}
        .transform-style-3d{transform-style:preserve-3d;}
        .backface-hidden{backface-visibility:hidden;}
        .rotate-y-180{transform:rotateY(180deg);}
        .nav-scroll::-webkit-scrollbar{height:4px;}
        .nav-scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px;}
        #ctd-probe{transition:top 0.2s ease-out;}
        
        @keyframes a-shrink{0%,100%{transform:scale(1);}50%{transform:scale(0.3);}} .anim-shrink{animation:a-shrink 1.5s ease-in-out;}
        @keyframes a-slide{0%,100%{transform:translateX(0);}50%{transform:translateX(60px) scale(0.8);opacity:0.5;}} .anim-slide{animation:a-slide 1.5s ease-in-out;}
        @keyframes a-wobble{0%,100%{transform:rotate(0) scale(1);}25%{transform:rotate(-15deg) scale(1.1);}75%{transform:rotate(15deg) scale(0.9);}} .anim-wobble{animation:a-wobble 1.5s ease-in-out;}
        @keyframes a-glow{0%,100%{filter:drop-shadow(0 0 0 yellow);}50%{filter:drop-shadow(0 0 25px yellow) brightness(1.5);}} .anim-glow{animation:a-glow 1.5s ease-in-out;}
        @keyframes a-zip{0%{transform:translateX(-80px);}50%{transform:translateX(80px);}100%{transform:translateX(0);}} .anim-zip{animation:a-zip 1s ease-in-out;}
        @keyframes a-flip{0%{transform:rotateX(0);}50%{transform:rotateX(180deg);}100%{transform:rotateX(0);}} .anim-flip{animation:a-flip 1.5s ease-in-out;}
        @keyframes a-fade{0%,100%{opacity:1;}50%{opacity:0.1;}} .anim-fade{animation:a-fade 1.5s ease-in-out;}
        @keyframes a-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-30px);}} .anim-float{animation:a-float 1.5s ease-in-out;}
        @keyframes a-grow{0%,100%{transform:scale(1);}50%{transform:scale(1.8);}} .anim-grow{animation:a-grow 1.5s ease-in-out;}

        .eco-line{stroke:rgba(255,255,255,0.2);stroke-width:3;transition:all 0.5s ease;}
        .eco-line-boom{stroke:#4ade80;stroke-width:6;opacity:0.8;stroke-dasharray:10;animation:fw-flow 0.8s linear infinite;}
        .eco-line-die{stroke:#ef4444;opacity:0.15;stroke-width:1;}
        .eco-boom{transform:translate(-50%,-50%) scale(1.3) !important;border-color:#4ade80 !important;box-shadow:0 0 25px rgba(74,222,128,0.6) !important;z-index:30 !important;}
        .eco-die{transform:translate(-50%,-50%) scale(0.6) !important;filter:grayscale(1) !important;opacity:0.4 !important;border-color:#ef4444 !important;}

        .qz-btn{background-color:rgba(255,255,255,0.1);padding:0.5rem;border-radius:0.5rem;text-align:left;transition:all 0.2s;}
        .qz-btn:hover{background-color:rgba(255,255,255,0.2);}
        .qz-step{margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid rgba(255,255,255,0.1);}
        .aq-btn{background-color:#1f2937;padding:0.5rem;border-radius:0.5rem;text-align:left;font-size:0.875rem;transition:background-color 0.2s;border:1px solid transparent;}
        .aq-btn:hover{background-color:#374151;border-color:#4b5563;}
        .aq-step{margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid #1f2937;}
        .mig-btn{background-color:#3730a3;padding:0.75rem;border-radius:0.75rem;text-align:left;font-weight:600;transition:background-color 0.2s;}
        .mig-btn:hover{background-color:#4338ca;}
        .mig-step{margin-top:1rem;padding-top:1rem;border-top:1px solid #3730a3;}
        .lab-btn{background-color:#374151;padding:0.5rem;border-radius:0.25rem;font-size:0.75rem;position:relative;padding-right:1.5rem;transition:background-color 0.2s;border:2px solid transparent;}
        .lab-btn:hover{background-color:#4b5563;}
        .info-ic{position:absolute;top:8px;right:6px;color:#9ca3af;cursor:pointer;transition:color 0.2s;}
        .info-ic:hover{color:#93c5fd;}
        
        .threat-radar{transition:all 0.5s ease-in-out;}
        .threat-flee{transform:scale(0) translateX(50px);opacity:0;}
        .threat-attack{transform:scale(3) translateX(-50px) translateY(20px);opacity:0;}
        .bio-cloud{position:absolute;width:15px;height:15px;background:#60a5fa;border-radius:50%;filter:blur(4px);animation:a-wobble 1s infinite alternate,a-fade 2s forwards;}
        @keyframes fall-snow{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(600px) rotate(360deg);opacity:0;}}
        .anim-marine-snow{animation:fall-snow 3.5s linear forwards;}
        
        .sonar-grid { background-image: linear-gradient(rgba(74,222,128,0.15) 1px, transparent 1px), linear-gradient(90deg, rgba(74,222,128,0.15) 1px, transparent 1px) !important; background-size: 40px 40px !important; background-color: #022c22 !important; }
        .sonar-blob { background-color: #4ade80; border-radius: 50%; filter: blur(12px); opacity: 0.85; transition: all 1s ease-in-out; }
        @keyframes radar-sweep { 0% { transform: translateY(-100%); } 100% { transform: translateY(600px); } }
    </style>
</head>

                for(let i=0;i<150;i++) pts.push({x:Math.random()*c.width, y:Math.random()*c.height, r:Math.random()*6+2, d:Math.random()*10});
                function draw() {
                    ctx.clearRect(0,0,c.width,c.height); ctx.fillStyle="gold"; ctx.beginPath();

        function startDash() {
            dashGame.active = true; dashGame.x = 50; dashGame.y = 90; dashGame.preds = [];
            for(let i=0; i<8; i++) {
                dashGame.preds.push({
                    x: Math.random()*100, y: 20 + Math.random()*50,
                    s: (Math.random()*0.6 + 0.3) * (Math.random()>0.5?1:-1),
                    e: ['🐟','🦈','🦑'][Math.floor(Math.random()*3)]
                });
            }
            document.getElementById('dash-layer').classList.remove('hidden');
            requestAnimationFrame(dashLoop);
        }

        function dashLoop() {
            if(!dashGame.active) return;
            if(keys.l) dashGame.x = Math.max(2, dashGame.x - 1);
            if(keys.r) dashGame.x = Math.min(95, dashGame.x + 1);
            if(keys.u) dashGame.y = Math.max(5, dashGame.y - 1);
            if(keys.d) dashGame.y = Math.min(95, dashGame.y + 1);

            let h = '';
            dashGame.preds.forEach(p => {
                p.x += p.s;
                if(p.x > 110) p.x = -10;
                if(p.x < -10) p.x = 110;
                h += `<div class="absolute text-4xl" style="left:${p.x}%; top:${p.y}%; transform: ${p.s>0?'scaleX(-1)':'scaleX(1)'}">${p.e}</div>`;
                if(Math.abs(p.x - dashGame.x) < 6 && Math.abs(p.y - dashGame.y) < 6) {
                    dashGame.y = 90; // Hit!
                    const dl = document.getElementById('dash-layer');
                    dl.classList.add('bg-red-500/50');
                    setTimeout(()=>dl.classList.remove('bg-red-500/50'), 200);
                }
            });

            h += `<div class="absolute text-3xl z-50 filter drop-shadow-[0_0_10px_white]" style="left:${dashGame.x}%; top:${dashGame.y}%; transition: none;">🦠</div>`;
            document.getElementById('dash-ents').innerHTML = h;

            if(dashGame.y <= 10) {
                dashGame.active = false;
                document.getElementById('dash-layer').classList.add('hidden');
                finishToggleToNight();
                return;
            }
            requestAnimationFrame(dashLoop);
        }

        function deployFish() {
            const z=document.getElementById('deploy-zone').value; logTel(`Deploying to ${z}...`);
            let s=false, m=""; const f=fishState, sp=f.specials;
            
            if(z==='intertidal') {
                if(sp.osmo && (sp.clinging || sp.sealing)) { s=true; m="Survived the crashing waves and survived the hot sun during low tide!"; }
                else m="Washed away or dried out! Intertidal organisms absolutely need Clinging/Sealing mechanisms AND Osmoregulation.";
            } else if(z==='epipelagic') { 
                if(f.morphology==='fusiform' && f.color==='countershaded'){s=true; m="Fusiform speed & Countershading made it an apex predator!";} 
                else m="Too slow/visible! Predators easily spotted and ate your fish in the bright sunlight."; 
            } else if(z==='mesopelagic') { 
                if(sp.photophores && (f.eyes==='giant' || f.eyes==='tubular') && sp.omz){s=true; m="Invisible shadows, spots prey easily, and breathes fine in the OMZ!";} 
                else m="Died! Without Photophores, giant eyes, and OMZ tolerance, you were either seen from below, starved, or suffocated."; 
            } else if(z==='bathypelagic') { 
                if(sp.lure && sp.jaws && f.morphology==='stasis'){s=true; m="Energy conserved in stasis, lured scarce prey, and unhinged jaws swallowed them whole!";} 
                else m="Starved! It's too dark to hunt without a lure, meals are too rare for small jaws, or you burned too much energy swimming."; 
            } else if(z==='abyssal') {
                if(sp.stilts && sp.chemo && f.morphology==='gigantism') { s=true; m="Scavenged huge whale falls using chemoreception while standing perfectly still on the mud!"; }
                else m="Sank into the soft silty mud or couldn't smell the rare food sources miles away.";
            } else if(z==='hadal') { 
                if(f.morphology==='gelatinous' && sp.tmao && sp.chemosyn){s=true; m="TMAO protected its proteins, a gelatinous body survived the crush, and it ate vent bacteria!";} 
                else m="Implosion! Hydrostatic pressure crushed its rigid body, unraveled proteins, or it starved without vent chemosynthesis."; 
            }
            
            if(s) { logTel(`<span class="text-green-400 font-bold">SUCCESS: ${m}</span>`); labWins[z]=true; if(Object.values(labWins).every(v=>v)){document.getElementById('lab-victory').classList.remove('hidden'); awardBadge('engineer');} }
            else logTel(`<span class="text-red-400 font-bold">CRITICAL FAILURE: ${m}</span>`);
        }

        // --- TRENCH RUN (PRESSURE) LOGIC ---
        function equipHull(i) {
            currentHullIndex=i; document.querySelectorAll('.hull-btn').forEach(b=>b.classList.remove('border-blue-500','bg-blue-900/50'));
            document.getElementById(`hull-btn-${i}`).classList.add('border-blue-500','bg-blue-900/50');
            document.getElementById('dash-max-atm').innerText=hullUpgrades[i].maxAtm; 
            if(!tGame.active) resetTrench();
        }
        function resetTrench() {
            tGame.active = false; tGame.surfacing = false; tGame.depth = 0; tGame.x = 50; tGame.dmg = 0; tGame.samp = 0; tGame.ents = [];
            tGame.max = hullUpgrades[currentHullIndex].maxAtm;
            document.getElementById('dive-shaft-ents').innerHTML = '';
            document.getElementById('sub-vessel').classList.remove('sub-crushed');
            updateTUI();
        }
        function resetTBtn(t) {
            const sd = document.getElementById('btn-start-dive'), db = document.getElementById('btn-drop-ballast');
            sd.innerText = t; sd.classList.remove('hidden'); db.classList.add('hidden');
        }
        function startTrenchDive() {
            resetTrench(); tGame.active = true;
            document.getElementById('btn-start-dive').classList.add('hidden');
            document.getElementById('btn-drop-ballast').classList.remove('hidden');
            document.getElementById('implosion-screen').classList.add('hidden');
            document.getElementById('trench-victory').classList.add('hidden');
            tGame.id = requestAnimationFrame(trenchLoop);
        }
        function dropBallast() {
            if(!tGame.active || tGame.surfacing) return;
            tGame.surfacing = true;
        }
        function trenchLoop() {
            if(!tGame.active) return;
            if(keys.l) tGame.x = Math.max(5, tGame.x - 1);
            if(keys.r) tGame.x = Math.min(95, tGame.x + 1);
            const sub = document.getElementById('sub-vessel');
            sub.style.left = tGame.x + '%';

            if(tGame.surfacing) {
                tGame.depth = Math.max(0, tGame.depth - 40);
                tGame.ents = []; 
                if(tGame.depth <= 0) {
                    tGame.active = false;
                    document.getElementById('trench-victory').innerHTML = `<i class="fa-solid fa-ship text-6xl text-blue-400 mb-4"></i><h3 class="text-3xl font-black text-white">Surfaced Safely!</h3><p class="text-blue-200 mt-2 font-bold">You brought back ${tGame.samp} samples!</p>`;
                    document.getElementById('trench-victory').classList.remove('hidden');
                    resetTBtn("DIVE AGAIN"); return;
                }
            } else { tGame.depth += 8; }

            const atm = 1 + (tGame.depth / 10), cMax = tGame.max - tGame.dmg;
            
            if (atm > cMax && !tGame.surfacing) {
                tGame.active = false; sub.classList.add('sub-crushed');
                document.getElementById('implode-msg').innerText = `Hull breached at ${atm.toFixed(1)} atm! (Integrity limit: ${cMax.toFixed(0)})`;
                document.getElementById('implosion-screen').classList.remove('hidden');
                resetTBtn("REBUILD & RETRY"); return;
            }

            if (tGame.depth >= 11000 && !tGame.surfacing) {
                tGame.active = false;
                document.getElementById('trench-victory').innerHTML = `<i class="fa-solid fa-medal text-6xl text-yellow-400 mb-4"></i><h3 class="text-3xl font-black text-white">Mariana Trench Reached!</h3><p class="text-green-200 mt-2 font-bold">Survived ${atm.toFixed(0)} ATM and collected ${tGame.samp} samples.</p>`;
                document.getElementById('trench-victory').classList.remove('hidden');
                resetTBtn("DIVE AGAIN"); awardBadge('physics'); return;
            }

            if(!tGame.surfacing && Math.random() < 0.08) {
                const isObs = Math.random() < 0.6, t = isObs ? (Math.random()<0.5?'🪨':'🦑') : (Math.random()<0.5?'💎':'🧬');
                tGame.ents.push({ x: Math.random()*90+5, y: 100, isObs: isObs, txt: t, dead: false });
            }

            let html = ''; const sY = Math.max(2, (tGame.depth/11000)*85);
            for(let i=tGame.ents.length-1; i>=0; i--) {
                let e = tGame.ents[i]; e.y -= 1.5;
                if(e.y < -10) { tGame.ents.splice(i, 1); continue; }
                if(!e.dead && Math.abs(e.y - sY) < 8 && Math.abs(e.x - tGame.x) < 10) {
                    e.dead = true;
                    if(e.isObs) {
                        tGame.dmg += (hullUpgrades[currentHullIndex].maxAtm * 0.1);
                        sub.classList.add('anim-shake'); setTimeout(()=>sub.classList.remove('anim-shake'), 400);
                    } else { tGame.samp++; }
                }
                if(!e.dead) html += `<div class="absolute transform -translate-x-1/2 -translate-y-1/2 text-3xl transition-none" style="left:${e.x}%; top:${e.y}%; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));">${e.txt}</div>`;
            }
            document.getElementById('dive-shaft-ents').innerHTML = html;
            updateTUI(); if(tGame.active) requestAnimationFrame(trenchLoop);
        }

        function updateTUI() {
            const d = tGame.depth, atm = 1 + (d / 10), m = tGame.max - tGame.dmg, p = (atm / m) * 100;
            document.getElementById('dash-depth-m').innerText = Math.floor(d);
            document.getElementById('dash-pressure').innerText = atm.toFixed(1);
            document.getElementById('dash-samples').innerText = tGame.samp;
            document.getElementById('dash-max-atm').innerText = m.toFixed(0);
            
            const b = document.getElementById('hull-bar'); b.style.width = Math.min(p, 100) + '%';
            if(p < 50) { b.className="h-full bg-green-500 transition-all"; document.getElementById('hull-warning').classList.add('hidden'); }
            else if(p < 90) { b.className="h-full bg-yellow-500 transition-all"; document.getElementById('hull-warning').classList.add('hidden'); }
            else { b.className="h-full bg-red-500 transition-all"; document.getElementById('hull-warning').classList.remove('hidden'); }

            const v = document.getElementById('sub-vessel');
            if(!v.classList.contains('sub-crushed')) v.style.top = Math.max(2, (d/11000)*85) + '%';
        }

        function startEcoMission(idx) {
            const m = eMissions[idx], l = document.getElementById('eco-log'), qz = document.getElementById('eco-quiz');
            qz.classList.add('hidden');
            l.innerHTML = `<div class="text-emerald-400 font-bold mb-2">Executing: ${m.n}...</div>`;
            
            eNodes.forEach(n => { const el=document.getElementById(`en-${n[0]}`); if(el) el.className = "eco-node absolute transform -translate-x-1/2 -translate-y-1/2 bg-slate-800 border-2 border-slate-500 hover:border-emerald-400 hover:bg-slate-700 rounded-2xl p-2 md:p-3 text-center z-20 transition-all duration-500 shadow-lg cursor-pointer"; });
            eLinks.forEach(lnk => { const el=document.getElementById(`el-${lnk[0]}-${lnk[1]}`); if(el) el.className = "eco-line"; });

            let step = 0;
            const iv = setInterval(() => {
                if(step < m.log.length) {
                    l.innerHTML += `<div class="text-gray-300 animate-fade-in">> ${m.log[step]}</div>`;
                    l.scrollTop = l.scrollHeight;
                    step++;
                } else {
                    clearInterval(iv);
                    Object.keys(m.eff).forEach(k => {
                        const el = document.getElementById(`en-${k}`);
                        if(el) {
                            if(m.eff[k] === 1) el.classList.add('eco-boom');
                            else if(m.eff[k] === -1) el.classList.add('eco-die');
                        }
                    });
                    eLinks.forEach(lnk => {
                        const el = document.getElementById(`el-${lnk[0]}-${lnk[1]}`);
                        if(el) {
                            if(m.eff[lnk[0]] === -1 || m.eff[lnk[1]] === -1) el.classList.add('eco-line-die');
                            else if(m.eff[lnk[0]] === 1 && m.eff[lnk[1]] === 1) el.classList.add('eco-line-boom');
                        }
                    });
                    
                    document.getElementById('eco-q-text').innerText = m.q;
                    document.getElementById('eco-q-opts').innerHTML = m.o.map((opt, oi) => `<button onclick="checkEco(${idx}, ${oi===m.a}, this)" class="bg-slate-700 hover:bg-emerald-600 p-2 rounded-lg text-xs font-bold text-white transition">${opt}</button>`).join('');
                    qz.classList.remove('hidden');
                    l.scrollTop = l.scrollHeight;
                }
            }, 1200);
        }

        function checkEco(idx, isC, btn) {
            if(isC) {
                btn.classList.add('bg-green-600'); btn.classList.remove('bg-slate-700','hover:bg-emerald-600');
                ecologyWins[idx] = true;
                document.getElementById('eco-log').innerHTML += `<div class="text-green-400 font-bold mt-4">> ECOSYSTEM STABILIZED.</div>`;
                document.getElementById('eco-log').scrollTop = document.getElementById('eco-log').scrollHeight;
                setTimeout(() => {
                    document.getElementById('eco-quiz').classList.add('hidden');
                    eNodes.forEach(n => { const el=document.getElementById(`en-${n[0]}`); if(el) el.className = "eco-node absolute transform -translate-x-1/2 -translate-y-1/2 bg-slate-800 border-2 border-slate-500 hover:border-emerald-400 hover:bg-slate-700 rounded-2xl p-2 md:p-3 text-center z-20 transition-all duration-500 shadow-lg cursor-pointer"; });
                    eLinks.forEach(lnk => { const el=document.getElementById(`el-${lnk[0]}-${lnk[1]}`); if(el) el.className = "eco-line"; });
                    if(ecologyWins.every(v=>v)) { document.getElementById('ecology-victory').classList.remove('hidden'); awardBadge('ecology'); }
                }, 1500);
            } else { btn.classList.add('bg-red-600', 'anim-shake'); setTimeout(()=>btn.classList.remove('bg-red-600', 'anim-shake'), 400); }
        }

        // --- BIO CODE LOGIC ---
        function renderBioCodeButtons() {
            const bcContainer = document.getElementById('bc-btn-container'); if(!bcContainer) return;
            bcContainer.innerHTML = bioCmds.map(c => `<button onclick="addBioCode('${c.id}', ${c.c})" class="bg-gray-800 hover:bg-gray-700 border border-gray-600 p-3 rounded-xl text-white font-bold transition active:scale-95 shadow-md flex justify-between items-center group"><div class="text-left"><span>${c.n}</span><br/><span class="text-xs text-gray-400 font-normal group-hover:text-cyan-300 transition">${c.d}</span></div><div class="bg-black/50 px-2 py-1 rounded text-cyan-400 text-xs">-${c.c} ATP</div></button>`).join('');
        }

        function loadBioLevel() {
            if(currentBioLevel>=bioLevels.length) { document.getElementById('biocode-victory').classList.remove('hidden'); awardBadge('biocode'); return; }
            const lvl=bioLevels[currentBioLevel];
            document.getElementById('bc-title').innerText=`Scenario ${currentBioLevel+1}: ${lvl.title}`;
            document.getElementById('bc-desc').innerText=`${lvl.desc} Hint: ${lvl.hint}`;
            document.getElementById('bc-threat-icon').innerText=lvl.te;
            document.getElementById('bc-threat-icon').className="text-4xl threat-radar";
            document.getElementById('bc-threat-name').innerText=lvl.tn;
            clearBioCode();
        }

        function addBioCode(c, cost) {
            if(currentATP + cost > 5) {
                const box = document.getElementById('bc-sequence-box');
                box.classList.add('border-red-500', 'anim-shake');
                setTimeout(()=>box.classList.remove('border-red-500', 'anim-shake'), 400);
                return;
            }
            currentBioSequence.push(c);
            currentATP += cost;
            renderBioCodeBox();
        }

        function clearBioCode() {
            currentBioSequence=[]; currentATP=0;
            renderBioCodeBox(); resetFishSVG();
        }

        function renderBioCodeBox() {
            const b=document.getElementById('bc-sequence-box');
            document.getElementById('bc-atp-text').innerText = `ATP: ${currentATP} / 5`;
            if(currentBioSequence.length===0) b.innerHTML=`<span class="text-gray-600 font-mono text-sm">awaiting_input...</span>`;
            else b.innerHTML=currentBioSequence.map(c=>`<span class="bg-cyan-700 text-white px-3 py-1 rounded-md text-sm shadow-md">${c}</span>`).join('<i class="fa-solid fa-arrow-right text-cyan-800 text-xs"></i>');
        }

        function resetFishSVG() {
            document.querySelectorAll('.bc-bulb').forEach(b=>{ b.classList.remove('bc-glow-active','bc-glow-flash','bc-glow-lure'); b.setAttribute('fill','#334155'); });
            document.getElementById('bc-clouds').innerHTML = '';
        }

        function executeBioCode() {
            resetFishSVG(); let d=0;
            currentBioSequence.forEach((c, idx) => {
                setTimeout(()=>{
                    if(c==='Belly') ['bc-p-belly1','bc-p-belly2','bc-p-belly3','bc-p-belly4'].forEach(id=>document.getElementById(id).classList.add('bc-glow-active'));
                    else if(c==='Tail') document.getElementById('bc-p-tail').classList.add('bc-glow-active');
                    else if(c==='Lure') { const l=document.getElementById('bc-p-lure'); l.classList.add('bc-glow-lure'); setTimeout(()=>l.classList.remove('bc-glow-lure'),500); }
                    else if(c==='Flash') ['bc-p-belly1','bc-p-belly2','bc-p-belly3','bc-p-belly4','bc-p-tail','bc-p-lure'].forEach(id=>{ const l=document.getElementById(id); l.classList.add('bc-glow-flash'); setTimeout(()=>l.classList.remove('bc-glow-flash'),200); });
                    else if(c==='Cloud') {
                        const cl = document.getElementById('bc-clouds');
                        for(let i=0; i<15; i++) {
                            cl.innerHTML += `<div class="bio-cloud" style="left:${40+Math.random()*20}%; top:${40+Math.random()*20}%;"></div>`;
                        }
                    }
                }, d); d+=800;
            });
            setTimeout(()=>{
                const o=document.getElementById('bc-result-overlay'); o.classList.remove('hidden');
                const tIcon = document.getElementById('bc-threat-icon');
                if(JSON.stringify(bioLevels[currentBioLevel].target)===JSON.stringify(currentBioSequence)) {
                    document.getElementById('bc-res-title').innerText="Sequence Accepted!"; document.getElementById('bc-res-title').className="text-4xl font-black text-green-400 mb-4";
                    document.getElementById('bc-res-desc').innerText=bioLevels[currentBioLevel].successMsg;
                    document.getElementById('bc-next-btn').classList.remove('hidden'); document.getElementById('bc-retry-btn').classList.add('hidden');
                    if(currentBioLevel===3) tIcon.innerText="❤️"; else tIcon.classList.add('threat-flee');
                } else {
                    document.getElementById('bc-res-title').innerText="Sequence Failed!"; document.getElementById('bc-res-title').className="text-4xl font-black text-red-500 mb-4";
                    document.getElementById('bc-res-desc').innerText="The light sequence did not produce the desired adaptation.";
                    document.getElementById('bc-next-btn').classList.add('hidden'); document.getElementById('bc-retry-btn').classList.remove('hidden');
                    tIcon.classList.add('threat-attack');
                }
            }, d+500);
        }
        function nextBioLevel() { document.getElementById('bc-result-overlay').classList.add('hidden'); currentBioLevel++; loadBioLevel(); }
        function retryBioLevel() { document.getElementById('bc-result-overlay').classList.add('hidden'); document.getElementById('bc-threat-icon').className="text-4xl threat-radar"; clearBioCode(); }

        // --- STUDY DECK LOGIC ---
        const studyCards=[
            ["What is an Ecotone?", "Transition area between two biological communities (e.g. Intertidal Zone)."],
            ["What is Desiccation?", "Fatal drying out of organisms exposed to air."],
            ["Benthic vs Pelagic?", "Benthic = ON the bottom. Pelagic = IN the water column."],
            ["What is the Azoic Hypothesis?", "Disproved 19th-century theory that no life existed below 1,800 feet."],
            ["Allochthonous vs Autochthonous", "Allochthonous = external energy. Autochthonous = internal energy."],
            ["What is a Piezolyte?", "Molecule (like TMAO) preventing proteins from crushing under pressure."],
            ["Deep Scattering Layer (DSL)?", "Dense layer of migrating organisms that reflects sonar pulses."],
            ["Physostomous vs Physoclistous?", "Physostomous = gulps air. Physoclistous = pulls gas from blood."],
            ["What is a Trophosome?", "Organ in Tubeworms that houses chemosynthetic bacteria."],
            ["Counter-illumination?", "Producing light on belly to match downwelling light."]
        ].map(c=>({q:c[0],a:c[1]}));

        function renderFlashcards() {
            const c=document.getElementById('flashcard-container');
            studyCards.forEach((cd, i) => {
                const el=document.createElement('div'); el.className="perspective-1000 h-64 cursor-pointer"; el.dataset.f="0";
                el.innerHTML=`<div class="relative w-full h-full transition-transform duration-700 transform-style-3d text-center"><div class="absolute w-full h-full bg-white border-2 border-purple-200 rounded-3xl p-6 shadow-lg flex flex-col justify-center items-center backface-hidden"><span class="text-purple-400 text-sm font-bold mb-2 uppercase tracking-widest">Question</span><h3 class="text-xl font-bold text-gray-800">${cd.q}</h3></div><div class="absolute w-full h-full bg-purple-600 rounded-3xl p-6 shadow-lg flex flex-col justify-center items-center backface-hidden rotate-y-180 text-white"><span class="text-purple-300 text-sm font-bold mb-2 uppercase tracking-widest">Answer</span><p class="text-lg font-semibold">${cd.a}</p></div></div>`;
                el.onclick=()=>{ el.querySelector('.transform-style-3d').classList.toggle('rotate-y-180'); if(el.dataset.f==="0"){el.dataset.f="1"; cardsFlipped++; if(cardsFlipped===studyCards.length){document.getElementById('scholar-victory').classList.remove('hidden'); awardBadge('scholar');}} };
                c.appendChild(el);
            });
        }

        window.onload = () => {
            if(window.OceanBadges) {
                badges = window.OceanBadges.initBadgeHost(() => {
                    badges = window.OceanBadges.loadBadges();
                    checkAllBadges();
                });
            }
            switchTab('zones');
        };
    </script>
